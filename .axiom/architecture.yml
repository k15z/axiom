test_clean_package_dependencies:
  tags: [architecture]
  on:
    - internal/**/*.go
  condition: >
    The internal packages should have clean dependency flow: cli depends on
    config, discovery, runner, and output. Runner depends on agent, cache,
    config, and discovery. Agent should NOT import from cli, runner, output,
    or discovery. Cache should NOT import from agent, runner, cli, or output.
    No circular dependencies should exist.

test_agent_tool_loop_terminates:
  tags: [architecture, reliability]
  on:
    - internal/agent/agent.go
  condition: >
    The agent tool loop must have a maximum iteration limit to prevent runaway
    API calls. If the agent exceeds this limit, it should return a failure result
    rather than looping indefinitely. The limit should be clearly defined as a
    constant or configurable parameter.

test_cli_does_not_import_agent:
  tags: [architecture]
  on:
    - internal/cli/*.go
    - internal/agent/*.go
  condition: >
    CLI command files in internal/cli/ must not directly import the
    internal/agent package. The CLI layer should interact with the agent
    only through the runner package, which handles orchestration. Check
    the import statements of all files in internal/cli/.

test_agent_has_no_upstream_imports:
  tags: [architecture]
  on:
    - internal/agent/*.go
  condition: >
    The agent package (internal/agent/) must not import any of these packages:
    internal/cli, internal/runner, internal/output, internal/discovery, or
    internal/cache. The agent is a leaf dependency that only knows about its
    own tools and the Anthropic SDK. Check all import blocks in internal/agent/.
