test_agent_is_leaf_dependency:
  tags: [architecture]
  on:
    - internal/agent/**/*.go
  condition: >
    The agent package should be a leaf dependency -- it should not import any
    higher-level packages from this project (such as CLI commands, test runners,
    output formatting, or test discovery). It should only depend on low-level
    utilities and external libraries.

test_cli_does_not_directly_use_agent:
  tags: [architecture]
  on:
    - internal/cli/**/*.go
  condition: >
    The CLI layer should not directly depend on the agent package. Interaction
    between the CLI and the agent should be mediated by an orchestration layer
    (e.g., the runner), maintaining separation of concerns.

test_agent_loop_has_bounded_execution:
  tags: [architecture, reliability]
  on:
    - internal/agent/**/*.go
  condition: >
    The agent's tool-use loop must have a maximum iteration bound to prevent
    runaway API calls. If the limit is exceeded, the agent should stop and
    return a failure rather than looping indefinitely.
