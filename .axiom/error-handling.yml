test_errors_include_diagnostic_context:
  tags: [error-handling]
  on:
    - internal/**/*.go
  condition: >
    Error messages returned from internal packages should include enough
    context to diagnose where the problem originated. Functions that receive
    an error from a callee should wrap it with additional context before
    returning, rather than passing it through bare.

test_setup_errors_use_distinct_exit_code:
  tags: [error-handling]
  on:
    - internal/cli/**/*.go
  condition: >
    Setup errors (such as missing API keys, invalid configuration, or test
    directory not found) should cause a different exit code than test failures.
    This allows CI systems and scripts to distinguish between "tests failed"
    and "axiom could not run at all."
