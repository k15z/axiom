test_agent_tools_prevent_path_traversal:
  tags: [security]
  on:
    - internal/agent/**/*.go
  condition: >
    Agent tools that accept file paths must prevent path traversal attacks.
    Resolved paths should be confined to the repository root -- attempts to
    access files outside the repo (e.g., "../../../etc/passwd") must be rejected.

test_no_arbitrary_command_execution:
  tags: [security]
  on:
    - internal/agent/**/*.go
  condition: >
    The agent must not be able to execute arbitrary shell commands. Any tool
    that runs a subprocess should construct the command internally from
    validated parameters, never by passing LLM-provided strings directly
    to a shell. No tool should invoke a shell interpreter (e.g., sh -c).

test_api_keys_not_leaked:
  tags: [security]
  on:
    - internal/**/*.go
  condition: >
    API keys and secrets must never appear in log output, error messages,
    or stdout/stderr. They should only be used when constructing API clients,
    never included in user-visible strings.
