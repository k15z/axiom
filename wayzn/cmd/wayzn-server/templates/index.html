<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayzn Door Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }
        .status {
            font-size: 1.1rem;
            margin: 1rem 0;
            padding: 0.75rem;
            border-radius: 8px;
            background: #16213e;
        }
        .status.open { border-left: 4px solid #0f3460; }
        .status.closed { border-left: 4px solid #e94560; }
        .status.unknown { border-left: 4px solid #666; }
        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        button {
            flex: 1;
            padding: 1rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-open {
            background: #0f3460;
            color: white;
        }
        .btn-close {
            background: #e94560;
            color: white;
        }
        .error {
            color: #e94560;
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 0.5rem;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 6px;
            display: none;
        }
        .error.show { display: block; }
        .spinner {
            display: none;
            margin: 1rem auto;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .spinner.show { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .refresh-btn {
            margin-top: 1rem;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            flex: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wayzn Door Control</h1>
        <div class="status {{.State}}" id="status">
            Door: <strong id="state">{{.State}}</strong>
        </div>
        <div class="spinner" id="spinner"></div>
        <div class="error" id="error">{{.Error}}</div>
        <div class="buttons">
            <button class="btn-open" onclick="sendCommand('open')">Open</button>
            <button class="btn-close" onclick="sendCommand('close')">Close</button>
        </div>
        <button class="refresh-btn" onclick="refreshStatus()">Refresh Status</button>
    </div>

    <script>
        const stateEl = document.getElementById('state');
        const statusEl = document.getElementById('status');
        const spinnerEl = document.getElementById('spinner');
        const errorEl = document.getElementById('error');

        function setLoading(on) {
            spinnerEl.classList.toggle('show', on);
            document.querySelectorAll('.buttons button').forEach(b => b.disabled = on);
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.toggle('show', !!msg);
        }

        function updateState(state) {
            stateEl.textContent = state;
            statusEl.className = 'status ' + state;
        }

        async function sendCommand(action) {
            setLoading(true);
            showError('');
            try {
                const resp = await fetch('/api/' + action, { method: 'POST' });
                const data = await resp.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    updateState(action === 'open' ? 'open' : 'closed');
                }
            } catch (err) {
                showError('Network error: ' + err.message);
            } finally {
                setLoading(false);
            }
        }

        async function refreshStatus() {
            setLoading(true);
            showError('');
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    updateState(data.state || 'unknown');
                }
            } catch (err) {
                showError('Network error: ' + err.message);
            } finally {
                setLoading(false);
            }
        }

        // Show initial error if any
        if (errorEl.textContent.trim()) {
            errorEl.classList.add('show');
        }
    </script>
</body>
</html>
