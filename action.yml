name: 'Axiom Tests'
description: 'Run AI-driven behavioral tests with axiom and post results as PR comments'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  api_key:
    description: 'Anthropic API key (or OpenAI/Gemini key if using those providers)'
    required: true
  provider:
    description: 'LLM provider: anthropic, openai, or gemini (default: anthropic)'
    required: false
    default: 'anthropic'
  model:
    description: 'Model to use (default: from axiom.yml or claude-haiku-4-5-20251001)'
    required: false
  test_dir:
    description: 'Path to test directory (default: .axiom/)'
    required: false
    default: '.axiom/'
  args:
    description: 'Additional arguments to pass to axiom run'
    required: false
    default: ''
  comment:
    description: 'Post results as PR comment (default: true)'
    required: false
    default: 'true'
  go_version:
    description: 'Go version to install (default: 1.25)'
    required: false
    default: '1.25'

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}

    - name: Install axiom
      shell: bash
      run: go install github.com/k15z/axiom/cmd/axiom@latest

    - name: Restore cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.test_dir }}.cache/
        key: axiom-${{ runner.os }}-${{ hashFiles(format('{0}**/*.yml', inputs.test_dir)) }}
        restore-keys: |
          axiom-${{ runner.os }}-

    - name: Run axiom tests
      shell: bash
      id: axiom
      env:
        ANTHROPIC_API_KEY: ${{ inputs.provider == 'anthropic' && inputs.api_key || '' }}
        OPENAI_API_KEY: ${{ inputs.provider == 'openai' && inputs.api_key || '' }}
        GEMINI_API_KEY: ${{ inputs.provider == 'gemini' && inputs.api_key || '' }}
      run: |
        args="--all --format github"
        if [ -n "${{ inputs.model }}" ]; then
          args="$args --model ${{ inputs.model }}"
        fi
        args="$args -d ${{ inputs.test_dir }}"
        if [ -n "${{ inputs.args }}" ]; then
          args="$args ${{ inputs.args }}"
        fi

        exit_code=0
        axiom run $args > "${{ runner.temp }}/axiom-results.md" 2>/dev/null || exit_code=$?

        cat "${{ runner.temp }}/axiom-results.md"

        if [ "$exit_code" -ne 0 ]; then
          echo "axiom_failed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const resultsPath = '${{ runner.temp }}/axiom-results.md';

          if (!fs.existsSync(resultsPath)) {
            core.warning('No axiom results file found, skipping PR comment');
            return;
          }

          const body = fs.readFileSync(resultsPath, 'utf8');
          if (!body.trim()) {
            core.warning('Axiom results file is empty, skipping PR comment');
            return;
          }

          const marker = '<!-- axiom-summary -->';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }

    - name: Check results
      if: steps.axiom.outputs.axiom_failed == 'true'
      shell: bash
      run: exit 1
